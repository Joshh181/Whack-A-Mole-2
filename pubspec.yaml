name: whack_a_mole
description: "A fun whack-a-mole game with authentication and leaderboard."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Audio
  audioplayers: ^6.5.1
  
  # Supabase (Authentication & Database)
  supabase_flutter: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/0a9fda5a-7790-4dd7-b29a-1bbbfa654976_removalai_preview.png"  
  
flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/sounds/
    # Uncomment these if you add specific files later:
    # - assets/images/mole.png
    # - assets/images/hole.png
    # - assets/sounds/whack.mp3
    # - assets/sounds/button_click.mp3
    # - assets/sounds/background.mp3